window-decoration = none
window-padding-x = 0
window-padding-y = 0
window-padding-balance = true
window-padding-color = extend
fullscreen = false
maximize = false
quit-after-last-window-closed = true
background-opacity = 1.0

font-family = "PleckJP"
font-family = "SF Pro"
font-size = 18.5
font-thicken = true

cursor-style = block
cursor-style-blink = false
cursor-color = #fffaf5

command = ~/dotfiles/terminal/startup.sh

keybind = super+shift+up=increase_font_size:1
keybind = super+shift+down=decrease_font_size:1
keybind = super+shift+0=reset_font_size

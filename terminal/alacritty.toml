[env]
TERM = "xterm-256color"

[window]
decorations = "none"
opacity = 1.0
startup_mode = "Windowed"

[scrolling]
history = 10000

[font]
builtin_box_drawing = false
size = 18.5
normal = { family = "PleckJP", style = "Regular" }
bold = { family = "PleckJP", style = "Bold" }
bold_italic = { family = "PleckJP", style = "Bold Italic" }
italic = { family = "PleckJP", style = "Italic" }

[colors]
draw_bold_text_with_bright_colors = false
cursor = { cursor = "#fffaf5", text = "CellBackground" }

[cursor]
unfocused_hollow = true
style = { blinking = "Off", shape = "Block" }

[terminal.shell]
program = "~/dotfiles/terminal/startup.sh"

[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "ArrowUp"
mods = "Command|Shift"

[[keyboard.bindings]]
action = "DecreaseFontSize"
key = "ArrowDown"
mods = "Command|Shift"

[[keyboard.bindings]]
action = "ResetFontSize"
key = "0"
mods = "Command|Shift"

[general]
live_config_reload = false
